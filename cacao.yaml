# CacaoDocs Configuration for Prompture
title: "Prompture"
description: "Structured JSON extraction from any LLM. Schema-enforced, Pydantic-native, multi-provider."
version: "1.0.0"
theme: "dark"
github_url: "https://github.com/jhd3197/prompture"

# Enable AI chat panel (requires prompture installed)
chat: true
chat_config:
  default_model: "openai/gpt-4o-mini"
  models:
    - "openai/gpt-4o-mini"
    - "openai/gpt-4o"
    - "claude/claude-sonnet-4-20250514"
    - "groq/llama-3.1-8b-instant"
  system_prompt: "You are a helpful assistant that answers questions about the Prompture library — a Python library for structured JSON extraction from LLMs. Be concise and reference specific functions, classes, or modules when relevant."

exclude_patterns:
  - "__pycache__"
  - ".venv"
  - "venv"
  - "prompture-env"
  - ".git"
  - "node_modules"
  - "build"
  - "dist"
  - "*.egg-info"
  - ".pytest_cache"
  - "_version.py"
  - "tests"
  - "examples"
  - "docs"
  - "feedback"
  - ".claude"
  - ".github"
  - ".pr"
  - "packages"
  - "scaffold"
  # Reduce driver noise - keep registries/base, exclude individual driver files
  - "async_airllm_driver.py"
  - "async_azure_driver.py"
  - "async_cachibot_driver.py"
  - "async_elevenlabs_stt_driver.py"
  - "async_elevenlabs_tts_driver.py"
  - "async_google_img_gen_driver.py"
  - "async_grok_img_gen_driver.py"
  - "async_hugging_driver.py"
  - "async_img_gen_base.py"
  - "async_lmstudio_driver.py"
  - "async_local_http_driver.py"
  - "async_modelscope_driver.py"
  - "async_moonshot_driver.py"
  - "async_ollama_embedding_driver.py"
  - "async_openai_embedding_driver.py"
  - "async_openai_img_gen_driver.py"
  - "async_openai_stt_driver.py"
  - "async_openai_tts_driver.py"
  - "async_stability_img_gen_driver.py"
  - "async_stt_base.py"
  - "async_tts_base.py"
  - "async_zai_driver.py"
